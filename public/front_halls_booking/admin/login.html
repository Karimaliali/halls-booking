<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280" />
    <title>تسجيل الدخول | إيفينتي برو</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="auth-body">
    <div class="auth-container">
      <!-- نموذج تسجيل الدخول -->
      <div class="auth-card" id="loginCard">
        <div class="auth-header">
          <h2>تسجيل الدخول</h2>
          <p>مرحباً بعودتك! يرجى إدخال بياناتك للدخول</p>
        </div>

        <form class="auth-form" id="loginForm">
          <div class="form-group">
            <label
              ><i class="fa-regular fa-envelope"></i> البريد الإلكتروني</label
            >
            <input type="email" placeholder="أدخل بريدك الإلكتروني" required />
          </div>

          <div class="form-group">
            <label><i class="fa-regular fa-lock"></i> كلمة المرور</label>
            <input type="password" placeholder="أدخل كلمة المرور" required />
          </div>

          <div class="form-group">
            <label><i class="fa-regular fa-user"></i> الدور</label>
            <select name="role" required>
              <option value="" disabled selected>اختر الدور</option>
              <option value="owner">مالك (Owner)</option>
              <option value="customer">مستخدم (Customer)</option>
            </select>
          </div>

          <div class="form-options">
            <label class="checkbox-container">
              <input type="checkbox" />
              <span>تذكرني</span>
            </label>
          </div>

          <button type="submit" class="auth-btn">
            <i class="fa-regular fa-arrow-left-to-bracket"></i>
            تسجيل الدخول
          </button>
        </form>

        <div class="auth-footer">
          <p>
            ليس لديك حساب؟
            <a href="signup.html" id="switchToSignup">التسجيل الآن</a>
          </p>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script type="module" src="../bootstrap.js"></script>
    <script src="../api.js"></script>
    <script src="script.js"></script>
  </body>
</html>
