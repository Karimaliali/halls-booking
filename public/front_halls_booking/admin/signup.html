<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1280" />
        <title>التسجيل لأول مرة | QAA'A</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="auth-body">
        <div class="auth-container">
            <div class="auth-card" id="signupCard">
                <div class="auth-header">
                    <h2>التسجيل لأول مرة</h2>
                    <p>أنشئ حسابك الآن واستمتع بخدماتنا</p>
                </div>

                <form class="auth-form" id="signupForm">
                    <div class="form-group">
                        <label
                            ><i class="fa-regular fa-user"></i> الاسم
                            الكامل</label
                        >
                        <input
                            type="text"
                            placeholder="أدخل اسمك الكامل"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label><i class="fa-regular fa-user"></i> الدور</label>
                        <select name="role" required>
                            <option value="" disabled selected>
                                اختر الدور
                            </option>
                            <option value="owner">مالك (Owner)</option>
                            <option value="customer">مستخدم (Customer)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label
                            ><i class="fa-regular fa-envelope"></i> البريد
                            الإلكتروني</label
                        >
                        <input
                            type="email"
                            placeholder="أدخل بريدك الإلكتروني"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label
                            ><i class="fa-regular fa-lock"></i> كلمة
                            المرور</label
                        >
                        <input
                            type="password"
                            placeholder="أدخل كلمة المرور"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label
                            ><i class="fa-regular fa-lock"></i> تأكيد كلمة
                            المرور</label
                        >
                        <input
                            type="password"
                            placeholder="أعد إدخال كلمة المرور"
                            required
                        />
                    </div>

                    <div class="form-options">
                        <label class="checkbox-container">
                            <input type="checkbox" required />
                            <span>أوافق على شروط الاستخدام</span>
                        </label>
                    </div>

                    <button type="submit" class="auth-btn">
                        <i class="fa-regular fa-user-plus"></i>
                        التسجيل
                    </button>
                </form>

                <div class="auth-footer">
                    <p>
                        لديك حساب؟
                        <a href="login.html" id="switchToLogin">الدخول الآن</a>
                    </p>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
        <script type="module" src="../bootstrap.js"></script>
        <script src="../api.js"></script>
        <script src="script.js"></script>
    </body>
</html>
